name: nexora
description: Discover Your Next Opportunity
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.6

  provider: ^6.1.2

  google_fonts: ^6.2.1

  image_picker: ^1.1.2

  shared_preferences: ^2.3.3

  intl: ^0.19.0

  flutter_local_notifications: ^18.0.1

  url_launcher: ^6.3.1

  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
